<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --text: #1a1a18;
    --muted: #999890;
    --rule: #e2e0da;
    --sidebar: 260px;
    --ease: 0.3s ease;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  aside {
    width: var(--sidebar);
    min-width: var(--sidebar);
    height: 100vh;
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    padding: 52px 36px 40px;
    overflow: hidden;
  }

  .site-header { margin-bottom: 52px; }

  .site-header .name {
    font-family: 'EB Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.01em;
    line-height: 1.3;
    color: var(--text);
  }

  .site-header .discipline {
    font-family: 'Jost', sans-serif;
    font-size: 10.5px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  nav { flex: 1; overflow-y: auto; }
  nav::-webkit-scrollbar { width: 0; }
  nav ul { list-style: none; }


  nav ul li a {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 14px 0;
    color: var(--muted);
    text-decoration: none;
    font-family: 'EB Garamond', serif;
    font-size: 15.5px;
    font-weight: 400;
    cursor: pointer;
    transition: color var(--ease);
    gap: 12px;
  }

  nav ul li a .title { flex: 1; }

  nav ul li a .year {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: #ccc9bf;
    transition: color var(--ease);
    white-space: nowrap;
  }

  nav ul li a:hover { color: var(--text); }
  nav ul li a:hover .year { color: var(--muted); }

  nav ul li a.active {
    color: var(--text);
    font-style: italic;
  }

  nav ul li a.active .year { color: var(--muted); }

  .sidebar-footer {
    margin-top: 40px;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #ccc9bf;
    line-height: 1.8;
  }

  main {
    flex: 1;
    height: 100vh;
    overflow-y: auto;
    position: relative;
  }

  main::-webkit-scrollbar { width: 0; }

  .landing {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .landing p {
    font-family: 'Jost', sans-serif;
    font-size: 10.5px;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #ccc9bf;
  }

  .project-view {
    display: none;
    animation: appear 0.4s ease;
  }

  .project-view.visible { display: flex; height: 100vh; }

  @keyframes appear {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .project-image {
    flex: 0 0 42%;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .project-image img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  .project-image--duo {
    display: flex;
    flex-direction: row;
    gap: 16px;
    padding: 40px;
    align-items: center;
  }

  .project-image--duo img {
    flex: 1;
    max-width: 50%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
  }

  .project-image--stack {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 40px;
    justify-content: center;
  }

  .project-image--stack img {
    max-width: 100%;
    max-height: 45%;
    width: auto;
    height: auto;
    object-fit: contain;
  }

  .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .img-placeholder span {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #ccc9bf;
  }

  .project-body {
    flex: 1;
    height: 100vh;
    overflow-y: auto;
    padding: 52px 56px;
  }

  .project-header { margin-bottom: 32px; }

  .project-header h2 {
    font-family: 'EB Garamond', serif;
    font-size: 30px;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 10px;
  }

  .project-meta-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .project-meta-row .year {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .project-meta-row .tag {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #ccc9bf;
  }

  .rule { height: 1px; background: var(--rule); margin-bottom: 32px; }

  .project-description {
    font-family: 'EB Garamond', serif;
    font-size: 17.5px;
    font-weight: 400;
    line-height: 1.85;
    color: #4a4a44;
  }

  .project-description p + p { margin-top: 1.2em; }

  .tech-row {
    margin-top: 44px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 20px;
    border-top: 1px solid var(--rule);
    padding-top: 20px;
  }

  .tech-row span {
    font-family: 'Jost', sans-serif;
    font-size: 10.5px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
</style>
</head>
<body>

<aside>
  <div class="site-header">
    <div class="name">Weezy Derham</div>
    <div class="discipline">Computational Art Portfolio</div>
  </div>
  <nav><ul id="nav-list"></ul></nav>
  <div class="sidebar-footer">Selected works<br>2021–2024</div>
</aside>

<main id="main-panel">
  <div class="landing" id="landing"><p>Select a work</p></div>
</main>

<script>
const projects = [
  {
    id:"p7", title:"Custom MP3 player", year:"2026", tag:"Interactive AI",
    tech:[], image:"Assets/MP3.png",
    description:`This project materialised out of a need to regain control of my music listening habits. Although music platforms have made music more accessible, they have also flattened the experience into something homogenous. The conversation around reclaiming control over music distribution comes from both musicians and listeners. Musicians are moving to find ways to escape platforms that barely pay, and listeners want to escape algorithms that mindlessly feed their attention, controlling what they hear next.

    For me, building my own MP3 player feels like a way to take back control, not only to be conscious of my listening habits, but also to explore what technology can look like if it reflected an individual's personality and style.

    I hope to continue to build this project into a workshop that i can share with people interested in building and developing their own personalised technology.
`
  },
  {
    id:"p6", title:"Mirror Mirror On The Wall...", year:"2026", tag:"Interactive AI",
    tech:[], image:"Assets/Mirror.png",
    description:`Mirror Mirror on the Wall grew out of an ongoing investigation into bias within AI and ML algorithms, building on previous work The Body is Not a Fact, which explored how systems like Stream Diffusion encode cultural assumptions into their outputs. Driven by a sense of unease at knowing that deeply biased programmes are being deployed in high-stakes decisions about people, the project sits at the intersection of two tensions: the well-documented dangers of algorithmic bias and the reality that these systems are already being used to judge and categorise human behaviour.
    
    The project channels a feeling of the uncanny to implicate the viewer in the very systems it critiques. Taking inspiration from the way people turn to AI as a kind of magic mirror, asking it to evaluate, advise, and affirm, the work reveals how these interactions quietly reduce the complexity of human experience to data points.
    `
  },
  {
    id:"p4", title:"Is this just life now? ", year:"2025", tag:"Installation",
    tech:[], image:"Assets/life.png",
    description:`
    A brain full of unfinished tasks, one thought flowing into the next never ending. Layer upon layer of mundane ritual and cyclical thoughts, we keep on going until we crash. Then we get back up and do it all again.

    Is this just life now?

    Is This Just Life Now? is an algorithmic piece that uses videos of chores and household tasks alongside screenshots from the notes app. The assets pop up on screen in a never ending loop, eventually causing the system to crash. The piece explores the chaos and mundanity of normal life, capturing that never ending feeling through algorithmic loops and glitch aesthetics to emulate a breaking down of the everyday.
    `
  },
  {
    id:"p3", title:"An abomination against nature itself", year:"2025", tag:"Knit",
    tech:[], image:"Assets/TatePiece.JPG",
    description:`This knitted piece came from a collaboration with artist Molly Bright during our time on the Tate's Tech Tea + Exchange. This piece explores queerness as a generative disruption within ordered systems. Incorporating AI generated imagery that pushes against normative boundaries, the work examines how digital spaces are policed and regulated based on prevailing beliefs. 

The design is built from a collage base combining text and AI generated imagery reflecting how generative image software and chatbots can be homophobic, with an intentionally abstract quality meant to be studied from close proximity. Loose threads emerging from the fabric visualise how rigidly ordered systems can be fundamentally transformed when their underlying structures are challenged. The deliberate glitches and imperfections throughout question what emerges when the imperfect is allowed to exist within standardised frameworks, and how queering both digital and physical spaces opens new possibilities for expression and understanding.
`
  },
  {
    id:"p2", title:"The Chains That Bound Us", year:"2024", tag:"Interactive Projection",
    tech: [], image:["Assets/chains1.png","Assets/chains2.png"],
    description:`This project represents an exploration into the convergent possibilities of projection art and interactive media, investigating how traditional display surfaces can be transformed into responsive, participatory experiences.

    Using TouchDesigner as my primary tool, I sought to create a system where viewers transition from observers to active participants in the creative process. My approach draws upon a rich tradition of mixed media installation artists who work at the intersection of light, form, and bodily presence within spatial environments. Daniel Rozin comments “In many cases the viewer becomes the contents of the piece and in others the viewer is invited to take an active role in the creation of the piece.” This is the sentiment I sought to explore.
`
  },
  {
    id:"p1", title:"Technological Drift", year:"2024", tag:"Video Projection",
    tech:[] ,image:["Assets/drift1.png","Assets/dirft2.png"], imageLayout:"stack",
    description:`This project explores the disconnection stemming from our limited understanding of the technology we use daily. By examining how computers operate at a fundamental level, through binary logic and operations, I aimed to create a piece influenced by binary numbers in a way that remains hidden from the viewer. 

The work explores this disconnection between our use and understanding of the technology we use every day. 

Through binary arrays, this piece displays a glitchy patchwork of visuals. `
  }
];

const navList = document.getElementById('nav-list');
const mainPanel = document.getElementById('main-panel');

projects.forEach((proj) => {
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.dataset.id = proj.id;
  a.innerHTML = `<span class="title">${proj.title}</span><span class="year">${proj.year}</span>`;
  a.addEventListener('click', () => openProject(proj.id, a));
  li.appendChild(a);
  navList.appendChild(li);

  const view = document.createElement('div');
  view.className = 'project-view';
  view.id = proj.id;

  let imgHtml, imageClass;
  if (Array.isArray(proj.image)) {
    imgHtml = proj.image.map(src => `<img src="${src}" alt="${proj.title}">`).join('');
    const layoutMod = proj.imageLayout === 'stack' ? 'project-image--stack' : 'project-image--duo';
    imageClass = `project-image ${layoutMod}`;
  } else if (proj.image) {
    imgHtml = `<img src="${proj.image}" alt="${proj.title}">`;
    imageClass = 'project-image';
  } else {
    imgHtml = `<div class="img-placeholder"><span>Image</span></div>`;
    imageClass = 'project-image';
  }

  const techTags = proj.tech.map(t => `<span>${t}</span>`).join('');
  const descP = proj.description.trim().split('\n\n').map(p => `<p>${p}</p>`).join('');

  view.innerHTML = `
    <div class="${imageClass}">${imgHtml}</div>
    <div class="project-body">
      <div class="project-header">
        <h2>${proj.title}</h2>
        <div class="project-meta-row">
          <span class="year">${proj.year}</span>
          <span class="tag">${proj.tag}</span>
        </div>
      </div>
      <div class="rule"></div>
      <div class="project-description">${descP}</div>
      <div class="tech-row">${techTags}</div>
    </div>`;

  mainPanel.appendChild(view);
});

function openProject(id, linkEl) {
  document.getElementById('landing').style.display = 'none';
  navList.querySelectorAll('a').forEach(a => a.classList.remove('active'));
  linkEl.classList.add('active');
  mainPanel.querySelectorAll('.project-view').forEach(v => v.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');
  mainPanel.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
